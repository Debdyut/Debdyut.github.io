<figure class="text-center" id="close_button">
        <i class="fa fa-arrow-left"></i>
</figure>
<div class="wrapper">
    <div class="container">
        <div class="row justify-content-center header" style="font-family: 'Berkshire Swash', cursive;">
            <div id="chatbot-name">Debdyut</div>
        </div>

        <div class="container style-2" id="message_area" style="padding-right: 30px;overflow: hidden;">
            <div class="row justify-content-right">
                <div class="shadow-p msg msg-left">
                    <span class="msg-text">
                        Hi, I am Debdyut, or at least a fragment of his consciousness 😀
                    </span>
                </div>
            </div>
            <div class="row justify-content-right">
                <div class="msg msg-left">
                    <span class="msg-text">
                        You can ask me anything about my projects, achievements, etc.
                    </span>
                </div>
            </div>
            <div class="row justify-content-right">
                <div class="msg msg-left">
                    <span class="msg-text">
                        Or if you just want to chit-chat, I am up for that too 😁
                    </span>
                </div>
            </div>
        </div>

        <div class="row input-area" style="padding: 5px;">
            <div class="col-10 col-lg-11" style="padding: 0">
                <div class="input-group input-group-lg">
                    <input id="txt-input" type="text" class="form-control" aria-label="Sizing example input"
                        aria-describedby="inputGroup-sizing-lg" placeholder="Enter your message here" autofocus>
                </div>
            </div>
            <div class="col-2 col-lg-1" id="send-button" style="padding-left: 5px">
                    <img src="./res/images/send_button.gif" height="50" width="50" />
            </div>
        </div>

    </div>
</div>
